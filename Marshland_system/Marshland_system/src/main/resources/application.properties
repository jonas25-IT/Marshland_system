# MariaDB Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/rugezi_marshland_db?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Enable SQL script initialization
spring.sql.init.mode=never

# H2 Console (for debugging) - disabled when using MariaDB
spring.h2.console.enabled=false

# Entity scanning
spring.jpa.packages-to-scan=com.rugezi.marshland.entity

# Server port
server.port=8083

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Custom property for upload path
app.upload.dir=uploads/species
