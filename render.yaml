services:
  # Backend Service (Spring Boot)
  - type: web
    name: marshland-backend
    runtime: java
    plan: free
    buildCommand: cd Marshland_system/Marshland_system && ./mvnw clean package -DskipTests
    startCommand: java -jar Marshland_system/Marshland_system/target/Marshland_system-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: ${SPRING_DATASOURCE_URL}
      - key: SPRING_DATASOURCE_USERNAME
        value: ${SPRING_DATASOURCE_USERNAME}
      - key: SPRING_DATASOURCE_PASSWORD
        value: ${SPRING_DATASOURCE_PASSWORD}
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SERVER_PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  # Frontend Service (React)
  - type: web
    name: marshland-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: REACT_APP_API_URL
        value: https://marshland-backend.onrender.com
      - key: PORT
        value: 3000

# Note: Render does not support MySQL databases natively.
# You need to use an external MySQL-compatible provider or switch to PostgreSQL.
# Options:
# 1. Use an external MySQL-compatible database (TiDB Cloud, PlanetScale, AWS RDS, etc.)
# 2. Switch to PostgreSQL (recommended for Render)
# 3. Use Render's PostgreSQL database (see DEPLOYMENT.md)
#
# Recommended: TiDB Cloud (free tier, fully MySQL-compatible)
# Sign up at: https://tidbcloud.com/
