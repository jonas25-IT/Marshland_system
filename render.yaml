services:
  # Backend Service (Spring Boot)
  - type: web
    name: marshland-backend
    runtime: java
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar Marshland_system/target/Marshland_system-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: marshland-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: marshland-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: marshland-db
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SERVER_PORT
        value: 8080

  # Frontend Service (React)
  - type: web
    name: marshland-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: REACT_APP_API_URL
        value: https://marshland-backend.onrender.com
      - key: PORT
        value: 3000

databases:
  # PostgreSQL Database
  - name: marshland-db
    databaseName: marshland_db
    user: marshland_user
